# Newman project config
# This file is the project deployment config generated during initialization.
# backend/config/defaults.yaml provides the built-in baseline template and fallback values.
# Keep actual project settings here.
# Model settings and secrets can still be overridden through NEWMAN_* values in .env when needed.

server:
  host: "0.0.0.0"
  port: 8005

runtime:
  max_tool_depth: 30
  context_compress_threshold: 0.85
  context_compaction_preserve_recent: 4
  context_compaction_max_failures: 3
  tool_retry_attempts: 3
  tool_retry_backoff_seconds: 1.0
  provider_retry_attempts: 3
  provider_retry_backoff_seconds: 1.0

sandbox:
  enabled: true
  backend: "linux_bwrap"
  mode: "workspace-write"
  network_access: true
  writable_roots: []
  timeout: 30
  output_limit_bytes: 10240

approval:
  level1_blacklist:
    - "rm -rf /"
    - "sudo"
    - "su "
    - "chmod 777 /"
    - "chown root"
  level2_patterns:
    - "write_file_outside_workspace"
    - "process_spawn"
    - "terminal_mutation_or_unknown"
    - "danger_full_access_terminal"
    - "maintain_memory"
    - "maintain_skill"
    - "maintain_plugin"
    - "maintain_tool"
  timeout_seconds: 120

permissions:
  readable_paths:
    - "."
  writable_paths:
    - "backend_data/memory"
    - "skills"
    - "plugins"
    - "backend/tools"
  protected_paths:
    - ".env"

channels:
  feishu:
    enabled: true
  wecom:
    enabled: true

paths:
  workspace: "/root/newman/test_runtimespace"
  data_dir: "backend_data"
  sessions_dir: "backend_data/sessions"
  memory_dir: "backend_data/memory"
  audit_dir: "backend_data/audit"
  plugins_dir: "plugins"
  skills_dir: "skills"
  mcp_dir: "backend_data/mcp"
  scheduler_dir: "backend_data/scheduler"
  channels_dir: "backend_data/channels"
