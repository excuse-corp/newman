# Base defaults for all Newman projects.
# Treat this file as the built-in template and fallback baseline.
# Project-level newman.yaml should represent the actual deployed project config.
# Model overrides and secrets are generally better placed in .env via NEWMAN_* variables.

server:
  host: "0.0.0.0"
  port: 8005
  cors_origins:
    - "http://localhost:3000"
    - "http://localhost:5173"
    - "http://localhost:6123"
    - "http://127.0.0.1:6123"
    - "http://localhost:7775"
    - "http://127.0.0.1:7775"

models:
  primary:
    type: "mock"
    model: "newman-dev"
    endpoint: null
    api_key: null
    context_window: 100000
    embedding_dimension: null
    timeout: 60
    max_tokens: 4096
    temperature: 0.2
  multimodal:
    type: "mock"
    model: "newman-dev"
    endpoint: null
    api_key: null
    context_window: 32000
    embedding_dimension: null
    timeout: 60
    max_tokens: 4096
    temperature: 0.2
  embedding:
    type: "mock"
    model: "newman-dev"
    endpoint: null
    api_key: null
    context_window: null
    embedding_dimension: 4096
    timeout: 60
    max_tokens: 4096
    temperature: 0.0
  reranker:
    type: "mock"
    model: "newman-dev"
    endpoint: null
    api_key: null
    context_window: 32000
    embedding_dimension: null
    timeout: 60
    max_tokens: 4096
    temperature: 0.0

runtime:
  max_tool_depth: 30
  context_compress_threshold: 0.8
  context_critical_threshold: 0.92
  context_compaction_preserve_recent: 4
  context_reply_reserve_tokens_large: 4096
  context_reply_reserve_tokens_small: 2048
  context_compact_reserve_tokens: 2048
  context_safety_buffer_tokens_large: 4096
  context_safety_buffer_tokens_medium: 2048
  context_safety_buffer_tokens_small: 1024
  context_compaction_max_failures: 3
  tool_retry_attempts: 3
  tool_retry_backoff_seconds: 1.0

rag:
  postgres_dsn: "postgresql://postgres@127.0.0.1:65437/newman"
  chroma_collection: "knowledge_chunks"
  lexical_candidate_count: 24
  vector_candidate_count: 24
  hybrid_candidate_count: 32

sandbox:
  enabled: true
  backend: "linux_bwrap"
  mode: "workspace-write"
  network_access: false
  writable_roots: []
  timeout: 30
  output_limit_bytes: 10240

approval:
  level1_blacklist:
    - "rm -rf /"
    - "sudo"
    - "su "
    - "chmod 777 /"
    - "chown root"
  level2_patterns:
    - "write_file_outside_workspace"
    - "process_spawn"
    - "terminal_mutation_or_unknown"
    - "danger_full_access_terminal"
    - "maintain_memory"
    - "maintain_skill"
    - "maintain_plugin"
    - "maintain_tool"
  timeout_seconds: 120

permissions:
  readable_paths:
    - "backend"
    - "frontend"
    - "docs"
    - "backend/tests"
    - "scripts"
  writable_paths:
    - "backend_data/memory"
    - "skills"
    - "plugins"
    - "backend/tools"
  protected_paths:
    - ".env"
    - "newman.yaml"
    - "backend_data/uploads"
    - "backend_data/chroma"
    - "backend_data/sessions"
    - "backend_data/audit"

channels:
  feishu:
    enabled: true
    webhook_token: null
  wecom:
    enabled: true
    webhook_token: null

paths:
  workspace: "."
  data_dir: "backend_data"
  sessions_dir: "backend_data/sessions"
  memory_dir: "backend_data/memory"
  audit_dir: "backend_data/audit"
  knowledge_dir: "backend_data/knowledge"
  chroma_dir: "backend_data/chroma"
  plugins_dir: "plugins"
  skills_dir: "skills"
  mcp_dir: "backend_data/mcp"
  scheduler_dir: "backend_data/scheduler"
  channels_dir: "backend_data/channels"
